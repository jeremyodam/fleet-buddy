<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>FleetBuddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    :root {
      --cyan: #00d4ff;
      --amber: #ffb800;
      --green: #00e87a;
      --red: #ff4444;
      --bg: #07090d;
      --surface: #0c1018;
      --surface2: #111823;
      --border: #1c2636;
      --border2: #243044;
      --text: #d8e4f0;
      --muted: #4a6180;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Barlow Condensed', sans-serif;
      --body: 'Rajdhani', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: var(--body);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    select option {
      background: #111823;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    input,
    select,
    textarea {
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
    }

    @keyframes scanline {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(500%);
        opacity: 0;
      }
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes decode {
      0% {
        letter-spacing: 0.4em;
        opacity: 0.3;
      }
      100% {
        letter-spacing: 0.08em;
        opacity: 1;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-in {
      animation: slide-up 0.3s ease forwards;
    }

    .decode-anim {
      animation: decode 0.5s ease forwards;
    }

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--body);
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.07);
    }

    .field-input.filled {
      border-color: rgba(0, 212, 255, 0.3);
    }

    select.field-input {
      cursor: pointer;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 7px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SHEET_URL =
      "https://script.google.com/macros/s/AKfycbzKK9QoGBtz50KP_lQ2sIkUJPrRdO6oM-rSbtamlfjliMiI_-eK4NjLtv29X5oLZxwW/exec";
    const API_URL = "/api/platerecognizer";

    const DEFAULT_DEPARTMENTS = [
      "Construction",
      "Contract Management",
      "Engineering",
      "Facilities",
      "Office Services",
      "Operational Support Services",
      "Operations Technical Services (OTS)",
      "Purchasing & Stores",
      "RMC",
      "Safety",
      "Spare / Awaiting Redeployment",
      "System Operations (SysOps)",
      "Training",
      "Transportation",
      "Utility Field Services (UFS)"
    ];

    const DEFAULT_LOCATIONS = [
      "Albany Resource Center",
      "Central Resource Center",
      "Coos Bay Resource Center",
      "Eugene Resource Center",
      "Lincoln City Resource Center",
      "Mt Scott Resource Center",
      "Parkrose Resource Center",
      "Salem Resource Center",
      "Sherwood OTC",
      "Sunset Resource Center",
      "The Dalles Resource Center",
      "Warrenton Resource Center",
      "Clark County Resource Center",
      "Transportation",
      "Spare / Pool Vehicle",
      "250 Taylor (Corporate)",
      "Portland LNG Plant",
      "Newport LNG Plant",
      "Miller Station",
      "Off-Site / Unassigned",
      "Dear Friends and Family"
    ];

    const STEPS = [
      { id: "plate", label: "License Plate", short: "PLATE", num: "01", emoji: "🪪" },
      { id: "unit", label: "Unit Number", short: "UNIT #", num: "02", emoji: "🔢" },
      { id: "vin", label: "VIN", short: "VIN", num: "03", emoji: "🔍" },
      { id: "details", label: "Details", short: "DETAILS", num: "04", emoji: "📋" }
    ];

    const toBase64 = (file, maxPx = 1600) =>
      new Promise((res, rej) => {
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
          let w = img.width;
          let h = img.height;

          if (w > maxPx || h > maxPx) {
            if (w > h) {
              h = Math.round((h * maxPx) / w);
              w = maxPx;
            } else {
              w = Math.round((w * maxPx) / h);
              h = maxPx;
            }
          }

          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          c.getContext("2d").drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          res(c.toDataURL("image/jpeg", 0.92).split(",")[1]);
        };

        img.onerror = () => rej(new Error("Image load failed"));
        img.src = url;
      });

    async function fetchWithRetry(url, options, { retries = 2, baseDelay = 1500, timeout = 55000 } = {}) {
      for (let attempt = 0; attempt <= retries; attempt++) {
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), timeout);

        try {
          const resp = await fetch(url, { ...options, signal: controller.signal });
          clearTimeout(tid);

          if (resp.ok) return await resp.json();

          const isRetryable = resp.status >= 500 || resp.status === 429;
          if (isRetryable && attempt < retries) {
            const delay = baseDelay * Math.pow(2, attempt);
            console.warn(`[FleetBuddy] HTTP ${resp.status} — retrying in ${delay}ms (attempt ${attempt + 1}/${retries})`);
            await new Promise((r) => setTimeout(r, delay));
            continue;
          }

          return { found: false, error: `Server error (HTTP ${resp.status}). ${attempt >= retries ? "All retries exhausted." : ""}` };
        } catch (e) {
          clearTimeout(tid);

          if (e.name === "AbortError") {
            if (attempt < retries) {
              const delay = baseDelay * Math.pow(2, attempt);
              console.warn(`[FleetBuddy] Timeout — retrying in ${delay}ms (attempt ${attempt + 1}/${retries})`);
              await new Promise((r) => setTimeout(r, delay));
              continue;
            }
            return { found: false, error: "Request timed out after multiple attempts. Check your connection and try again." };
          }

          if (attempt < retries) {
            const delay = baseDelay * Math.pow(2, attempt);
            console.warn(`[FleetBuddy] Network error — retrying in ${delay}ms (attempt ${attempt + 1}/${retries})`);
            await new Promise((r) => setTimeout(r, delay));
            continue;
          }

          return { found: false, error: `Network error: ${e.message}. Check your internet connection.` };
        }
      }
    }

    async function callAPI(file, mode) {
      const b64 = await toBase64(file);

      return fetchWithRetry(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: b64, mode })
      });
    }

    async function decodeVin(vin) {
      const resp = await fetch(
        `https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`
      );
      const data = await resp.json();
      const r = data.Results?.[0] || {};
      const displacement = parseFloat(r.DisplacementL);

      return {
        year: r.ModelYear || "",
        make: r.Make || "",
        model: r.Model || "",
        trim: r.Trim || "",
        body: r.BodyClass || "",
        engine: Number.isFinite(displacement) ? `${displacement.toFixed(1)}L` : "",
        cylinders: r.EngineCylinders || "",
        drive: r.DriveType || "",
        fuel: r.FuelTypePrimary || ""
      };
    }

    function Spinner({ color = "var(--amber)" }) {
      return (
        <div
          style={{
            width: 16,
            height: 16,
            border: `2px solid ${color}`,
            borderTopColor: "transparent",
            borderRadius: "50%",
            animation: "spin 0.75s linear infinite",
            flexShrink: 0
          }}
        />
      );
    }

    function BracketCard({ children, accent = "cyan", style = {} }) {
      const c =
        {
          cyan: "#00d4ff",
          amber: "#ffb800",
          green: "#00e87a",
          red: "#ff4444"
        }[accent] || "#00d4ff";

      return (
        <div
          style={{
            position: "relative",
            background: "var(--surface)",
            border: "1px solid var(--border)",
            borderRadius: 4,
            padding: "18px 20px",
            ...style
          }}
        >
          <span style={{ position: "absolute", top: -1, left: -1, width: 14, height: 14, borderTop: `2px solid ${c}`, borderLeft: `2px solid ${c}`, opacity: 0.65 }} />
          <span style={{ position: "absolute", top: -1, right: -1, width: 14, height: 14, borderTop: `2px solid ${c}`, borderRight: `2px solid ${c}`, opacity: 0.65 }} />
          <span style={{ position: "absolute", bottom: -1, left: -1, width: 14, height: 14, borderBottom: `2px solid ${c}`, borderLeft: `2px solid ${c}`, opacity: 0.65 }} />
          <span style={{ position: "absolute", bottom: -1, right: -1, width: 14, height: 14, borderBottom: `2px solid ${c}`, borderRight: `2px solid ${c}`, opacity: 0.65 }} />
          {children}
        </div>
      );
    }

    function StatusPill({ color, label }) {
      return (
        <span
          style={{
            display: "inline-flex",
            alignItems: "center",
            gap: 6,
            background: `${color}14`,
            border: `1px solid ${color}40`,
            borderRadius: 2,
            padding: "4px 12px"
          }}
        >
          <span
            style={{
              width: 5,
              height: 5,
              borderRadius: "50%",
              background: color,
              boxShadow: `0 0 6px ${color}`
            }}
          />
          <span
            style={{
              fontFamily: "var(--mono)",
              fontSize: 10,
              color,
              letterSpacing: "0.08em",
              textTransform: "uppercase"
            }}
          >
            {label}
          </span>
        </span>
      );
    }

    function DataTag({ label, value, color = "var(--cyan)" }) {
      return (
        <div
          style={{
            background: "var(--surface2)",
            border: "1px solid var(--border)",
            borderRadius: 4,
            padding: "10px 12px"
          }}
        >
          <div
            style={{
              fontFamily: "var(--mono)",
              fontSize: 9,
              letterSpacing: "0.1em",
              color: "var(--muted)",
              textTransform: "uppercase",
              marginBottom: 4
            }}
          >
            {label}
          </div>
          <div
            style={{
              fontFamily: "var(--mono)",
              fontSize: 13,
              fontWeight: 600,
              color,
              letterSpacing: "0.06em",
              wordBreak: "break-all"
            }}
          >
            {value || "—"}
          </div>
        </div>
      );
    }

    function CameraCapture({ label, hint, onCapture, captured, accentColor = "var(--cyan)" }) {
      const ref = useRef();

      const onChange = (e) => {
        const f = e.target.files[0];
        if (f) onCapture({ file: f, url: URL.createObjectURL(f) });
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <p
            style={{
              fontFamily: "var(--body)",
              fontSize: 13,
              color: "var(--muted)",
              lineHeight: 1.6,
              margin: 0
            }}
          >
            {hint}
          </p>

          <input
            ref={ref}
            type="file"
            accept="image/*"
            capture="environment"
            style={{ display: "none" }}
            onChange={onChange}
          />

          {captured ? (
            <div style={{ position: "relative" }}>
              <img
                src={captured.url}
                alt={label}
                style={{
                  width: "100%",
                  borderRadius: 4,
                  maxHeight: 240,
                  objectFit: "cover",
                  border: "1px solid var(--border2)",
                  display: "block"
                }}
              />
              <span style={{ position: "absolute", top: 8, left: 8, width: 18, height: 18, borderTop: "2px solid var(--green)", borderLeft: "2px solid var(--green)" }} />
              <span style={{ position: "absolute", top: 8, right: 8, width: 18, height: 18, borderTop: "2px solid var(--green)", borderRight: "2px solid var(--green)" }} />
              <span style={{ position: "absolute", bottom: 8, left: 8, width: 18, height: 18, borderBottom: "2px solid var(--green)", borderLeft: "2px solid var(--green)" }} />
              <span style={{ position: "absolute", bottom: 8, right: 8, width: 18, height: 18, borderBottom: "2px solid var(--green)", borderRight: "2px solid var(--green)" }} />
              <div
                style={{
                  position: "absolute",
                  top: 10,
                  left: 10,
                  background: "var(--green)",
                  color: "#000",
                  fontFamily: "var(--mono)",
                  fontSize: 9,
                  fontWeight: 700,
                  padding: "3px 10px",
                  borderRadius: 2,
                  letterSpacing: "0.1em"
                }}
              >
                CAPTURED ✓
              </div>
              <button
                onClick={() => ref.current.click()}
                style={{
                  position: "absolute",
                  bottom: 10,
                  right: 10,
                  background: "rgba(7,9,13,0.9)",
                  color: "var(--muted)",
                  border: "1px solid var(--border2)",
                  borderRadius: 2,
                  padding: "5px 12px",
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  cursor: "pointer",
                  letterSpacing: "0.08em"
                }}
              >
                RETAKE
              </button>
            </div>
          ) : (
            <button
              onClick={() => ref.current.click()}
              style={{
                background: "var(--surface2)",
                border: "1px dashed var(--border2)",
                borderRadius: 4,
                padding: "44px 20px",
                cursor: "pointer",
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: 14,
                width: "100%",
                position: "relative",
                overflow: "hidden",
                transition: "border-color 0.2s"
              }}
              onMouseEnter={(e) => (e.currentTarget.style.borderColor = "rgba(0,212,255,0.4)")}
              onMouseLeave={(e) => (e.currentTarget.style.borderColor = "var(--border2)")}
            >
              <div
                style={{
                  position: "absolute",
                  left: 0,
                  right: 0,
                  height: 2,
                  background: "linear-gradient(90deg,transparent,var(--cyan),transparent)",
                  animation: "scanline 2.8s ease-in-out infinite",
                  opacity: 0.3
                }}
              />
              <span style={{ position: "absolute", top: 10, left: 10, width: 14, height: 14, borderTop: `1px solid ${accentColor}`, borderLeft: `1px solid ${accentColor}`, opacity: 0.5 }} />
              <span style={{ position: "absolute", top: 10, right: 10, width: 14, height: 14, borderTop: `1px solid ${accentColor}`, borderRight: `1px solid ${accentColor}`, opacity: 0.5 }} />
              <span style={{ position: "absolute", bottom: 10, left: 10, width: 14, height: 14, borderBottom: `1px solid ${accentColor}`, borderLeft: `1px solid ${accentColor}`, opacity: 0.5 }} />
              <span style={{ position: "absolute", bottom: 10, right: 10, width: 14, height: 14, borderBottom: `1px solid ${accentColor}`, borderRight: `1px solid ${accentColor}`, opacity: 0.5 }} />
              <div style={{ fontSize: 36 }}>📷</div>
              <div
                style={{
                  fontFamily: "var(--display)",
                  fontSize: 20,
                  fontWeight: 700,
                  letterSpacing: "0.15em",
                  color: "var(--text)"
                }}
              >
                TAP TO CAPTURE
              </div>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--muted)",
                  letterSpacing: "0.08em",
                  textTransform: "uppercase"
                }}
              >
                {label}
              </div>
            </button>
          )}
        </div>
      );
    }

    function ScanResult({ state, label, value, isVin, errorMsg }) {
      if (state === "idle") return null;

      if (state === "scanning")
        return (
          <div
            className="animate-in"
            style={{
              background: "rgba(255,184,0,0.05)",
              border: "1px solid rgba(255,184,0,0.2)",
              borderRadius: 4,
              padding: "14px 16px",
              display: "flex",
              alignItems: "center",
              gap: 14,
              marginTop: 12
            }}
          >
            <Spinner />
            <div>
              <div
                style={{
                  fontFamily: "var(--display)",
                  fontSize: 16,
                  fontWeight: 700,
                  letterSpacing: "0.1em",
                  color: "var(--amber)"
                }}
              >
                READING {label.toUpperCase()}…
              </div>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--muted)",
                  marginTop: 3
                }}
              >
                Gemini AI analyzing image
              </div>
            </div>
          </div>
        );

      if (state === "failed")
        return (
          <div
            className="animate-in"
            style={{
              background: "rgba(255,68,68,0.05)",
              border: "1px solid rgba(255,68,68,0.2)",
              borderRadius: 4,
              padding: "14px 16px",
              display: "flex",
              alignItems: "center",
              gap: 14,
              marginTop: 12
            }}
          >
            <span style={{ fontSize: 18, color: "var(--red)", flexShrink: 0 }}>✕</span>
            <div>
              <div
                style={{
                  fontFamily: "var(--display)",
                  fontSize: 14,
                  fontWeight: 700,
                  letterSpacing: "0.1em",
                  color: "var(--red)"
                }}
              >
                {errorMsg && (errorMsg.includes("timed out") || errorMsg.includes("Network"))
                  ? "CONNECTION ISSUE"
                  : `COULD NOT READ ${label.toUpperCase()}`}
              </div>
              {errorMsg && (
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 10,
                    color: "rgba(255,68,68,0.7)",
                    marginTop: 3,
                    lineHeight: 1.4
                  }}
                >
                  {errorMsg}
                </div>
              )}
            </div>
          </div>
        );

      if (state === "decoding")
        return (
          <div
            className="animate-in"
            style={{
              background: "rgba(0,212,255,0.05)",
              border: "1px solid rgba(0,212,255,0.2)",
              borderRadius: 4,
              padding: "14px 16px",
              display: "flex",
              alignItems: "center",
              gap: 14,
              marginTop: 12
            }}
          >
            <Spinner color="var(--cyan)" />
            <div>
              <div
                style={{
                  fontFamily: "var(--display)",
                  fontSize: 16,
                  fontWeight: 700,
                  letterSpacing: "0.1em",
                  color: "var(--cyan)"
                }}
              >
                DECODING VIN
              </div>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--muted)",
                  marginTop: 3
                }}
              >
                Querying NHTSA database…
              </div>
            </div>
          </div>
        );

      if (state === "done" && value)
        return (
          <div
            className="animate-in"
            style={{
              background: "rgba(0,232,122,0.05)",
              border: "1px solid rgba(0,232,122,0.25)",
              borderRadius: 4,
              padding: "14px 16px",
              display: "flex",
              alignItems: "center",
              gap: 14,
              marginTop: 12
            }}
          >
            <span style={{ fontSize: 22, color: "var(--green)", flexShrink: 0 }}>✓</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 9,
                  color: "var(--muted)",
                  textTransform: "uppercase",
                  letterSpacing: "0.1em",
                  marginBottom: 5
                }}
              >
                {label} DETECTED
              </div>
              <div
                className="decode-anim"
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: isVin ? 12 : 22,
                  fontWeight: 700,
                  color: "var(--green)",
                  letterSpacing: isVin ? "0.08em" : "0.2em",
                  wordBreak: "break-all"
                }}
              >
                {value}
              </div>
            </div>
          </div>
        );

      return null;
    }

    function ManualEntry({ label, value, setValue, onSubmit, btnLabel, maxLen, hint }) {
      return (
        <div
          className="animate-in"
          style={{
            background: "rgba(255,68,68,0.04)",
            border: "1px solid rgba(255,68,68,0.2)",
            borderRadius: 4,
            padding: "16px",
            marginTop: 12
          }}
        >
          <div
            style={{
              fontFamily: "var(--mono)",
              fontSize: 10,
              color: "var(--red)",
              letterSpacing: "0.1em",
              textTransform: "uppercase",
              marginBottom: 6
            }}
          >
            SCAN FAILED — ENTER MANUALLY
          </div>

          {hint && (
            <div
              style={{
                fontFamily: "var(--mono)",
                fontSize: 10,
                color: "var(--muted)",
                marginBottom: 12
              }}
            >
              {hint}
            </div>
          )}

          <input
            value={value}
            onChange={(e) => setValue(e.target.value.toUpperCase())}
            placeholder={`Enter ${label}`}
            maxLength={maxLen}
            className="field-input"
            style={{
              marginBottom: 10,
              fontFamily: "var(--mono)",
              fontSize: 14,
              letterSpacing: "0.1em"
            }}
          />

          <button
            onClick={onSubmit}
            disabled={!value.trim()}
            style={{
              width: "100%",
              border: "none",
              borderRadius: 3,
              padding: "11px",
              background: value.trim()
                ? "linear-gradient(90deg,#00d4ff,#0099cc)"
                : "var(--surface2)",
              color: value.trim() ? "#000" : "var(--muted)",
              fontFamily: "var(--display)",
              fontSize: 17,
              fontWeight: 700,
              letterSpacing: "0.12em",
              cursor: value.trim() ? "pointer" : "not-allowed"
            }}
          >
            {btnLabel}
          </button>
        </div>
      );
    }

      sheetStatus,
      sheetAction,
      sheetDebugMsg,
      onReset,
      onRetrySync

      const vi = data.vehicleInfo;

      return (
        <div className="animate-in" style={{ paddingBottom: 40 }}>
          <BracketCard
            accent="green"
            style={{ textAlign: "center", padding: "32px 24px", marginBottom: 14 }}
          >
            <div style={{ fontSize: 52, marginBottom: 12 }}>✅</div>
            <div
              style={{
                fontFamily: "var(--display)",
                fontSize: 40,
                fontWeight: 800,
                letterSpacing: "0.1em",
                color: "var(--green)",
                lineHeight: 1
              }}
            >
              VEHICLE LOGGED
            </div>
            <div
              style={{
                fontFamily: "var(--mono)",
                fontSize: 10,
                color: "var(--muted)",
                marginTop: 8,
                marginBottom: 18
              }}
            >
              {new Date().toLocaleString()}

            {sheetAction && (

              color={
                sheetStatus === "synced"
                  ? "var(--green)"
                  : sheetStatus === "pending"
                  ? "var(--amber)"
                  : sheetStatus === "error"
                  ? "var(--red)"
                  : "var(--muted)"
              }
              label={
                sheetStatus === "synced"
                  ? "Synced to Google Sheets"
                  : sheetStatus === "pending"
                  ? "Syncing…"
                  : sheetStatus === "error"
                  ? "Sync Failed"

            />

            {sheetStatus === "error" && (
              <div
                style={{
                  marginTop: 12,
                  background: "rgba(255,68,68,0.06)",
                  border: "1px solid rgba(255,68,68,0.25)",
                  borderRadius: 3,
                  padding: "10px 12px",
                  textAlign: "left"
                }}
              >
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 9,
                    color: "var(--red)",
                    letterSpacing: "0.1em",
                    marginBottom: 4
                  }}
                >
                  SYNC FAILED
                </div>
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 10,
                    color: "rgba(255,68,68,0.8)",
                    wordBreak: "break-all",
                    lineHeight: 1.5,
                    marginBottom: 10

                >
                  {sheetDebugMsg || "Could not save to Google Sheets. Your data has been captured — tap retry to try again."}
                </div>
                {onRetrySync && (
                  <button
                    onClick={onRetrySync}
                    style={{
                      width: "100%",
                      border: "1px solid rgba(255,184,0,0.4)",
                      borderRadius: 3,
                      padding: "10px",
                      background: "rgba(255,184,0,0.08)",
                      color: "var(--amber)",
                      fontFamily: "var(--display)",
                      fontSize: 15,
                      fontWeight: 700,
                      letterSpacing: "0.12em",
                      cursor: "pointer"
                    }}
                  >
                    RETRY SYNC
                  </button>
                )}
              </div>
            )}
          </BracketCard>

          {vi && (
            <div
              style={{
                background: "var(--surface)",
                border: "1px solid var(--border)",
                borderRadius: 4,
                padding: "14px 16px",
                marginBottom: 12
              }}
            >
              <div
                style={{
                  fontFamily: "var(--display)",
                  fontSize: 22,
                  fontWeight: 800,
                  letterSpacing: "0.04em",
                  marginBottom: 4
                }}
              >
                {vi.year} {vi.make} {vi.model} {vi.trim}
              </div>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--muted)"
                }}
              >
                {[vi.body, vi.engine, vi.drive, vi.fuel].filter(Boolean).join("  ·  ")}
              </div>
              {data.vin && (
                <div
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 10,
                    color: "rgba(0,212,255,0.3)",
                    marginTop: 6
                  }}
                >
                  {data.vin}
                </div>
              )}
            </div>
          )}

          <div
            style={{
              display: "grid",
              gridTemplateColumns: "1fr 1fr 1fr",
              gap: 8,
              marginBottom: 12
            }}
          >
            {[
              { label: "Plate", img: data.platePhoto?.url },
              { label: "Unit #", img: data.unitPhoto?.url },
              { label: "VIN", img: data.vinPhoto?.url }
            ].map(
              ({ label, img }) =>
                img && (
                  <div key={label}>
                    <img
                      src={img}
                      alt={label}
                      style={{
                        width: "100%",
                        aspectRatio: "1",
                        objectFit: "cover",
                        borderRadius: 4,
                        border: "1px solid var(--border)",
                        display: "block"
                      }}
                    />
                    <p
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 9,
                        color: "var(--muted)",
                        marginTop: 4,
                        textTransform: "uppercase",
                        letterSpacing: "0.07em"
                      }}
                    >
                      {label}
                    </p>
                  </div>
                )
            )}
          </div>

          <div
            style={{
              background: "var(--surface)",
              border: "1px solid var(--border)",
              borderRadius: 4,
              padding: "14px 16px",
              marginBottom: 14
            }}
          >
            {[
              ["PLATE", data.plate],
              ["UNIT #", data.unitNumber],
              ["VIN", data.vin],
              [
                "VEHICLE",
                data.vehicleInfo
                  ? `${data.vehicleInfo.year} ${data.vehicleInfo.make} ${data.vehicleInfo.model}`
                  : null
              ],
              ["DEPT", data.department],
              ["LOCATION", data.location],
              ["SUBMITTED BY", data.submittedBy],
              ["ASSIGNED TO", data.assignedTo],
              ["NOTES", data.notes]
            ]
              .filter(([, v]) => v)
              .map(([k, v]) => (
                <div
                  key={k}
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "flex-start",
                    padding: "8px 0",
                    borderBottom: "1px solid var(--border)"
                  }}
                >
                  <span
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: 9,
                      color: "var(--muted)",
                      textTransform: "uppercase",
                      letterSpacing: "0.08em",
                      flexShrink: 0,
                      marginRight: 16
                    }}
                  >
                    {k}
                  </span>
                  <span
                    style={{
                      fontFamily: "var(--body)",
                      fontSize: 14,
                      fontWeight: 600,

                    {v}

          <button

              color: "#000",

            LOG ANOTHER VEHICLE

    function App() {
      const [departments, setDepartments] = useState(DEFAULT_DEPARTMENTS);
      const [locations, setLocations] = useState(DEFAULT_LOCATIONS);
      const [step, setStep] = useState(0);
      const stepId = STEPS[step]?.id;

      const [platePhoto, setPlatePhoto] = useState(null);
      const [plateScanState, setPlateScanState] = useState("idle");
      const [detectedPlate, setDetectedPlate] = useState("");
      const [manualPlate, setManualPlate] = useState("");

      const [unitPhoto, setUnitPhoto] = useState(null);
      const [unitScanState, setUnitScanState] = useState("idle");
      const [detectedUnit, setDetectedUnit] = useState("");
      const [manualUnit, setManualUnit] = useState("");
      const [unitSkipped, setUnitSkipped] = useState(false);

      const [vinPhoto, setVinPhoto] = useState(null);
      const [vinScanState, setVinScanState] = useState("idle");
      const [detectedVin, setDetectedVin] = useState("");
      const [manualVin, setManualVin] = useState("");
      const [vehicleInfo, setVehicleInfo] = useState(null);

      const [plateErrorMsg, setPlateErrorMsg] = useState("");
      const [unitErrorMsg, setUnitErrorMsg] = useState("");
      const [vinErrorMsg, setVinErrorMsg] = useState("");

      const [submittedBy, setSubmittedBy] = useState("");
      const [department, setDepartment] = useState("");
      const [location, setLocation] = useState("");
      const [assignedTo, setAssignedTo] = useState("");
      const [notes, setNotes] = useState("");
      const [existingRecord, setExistingRecord] = useState(null);

      const [submitted, setSubmitted] = useState(false);
      const [sheetStatus, setSheetStatus] = useState("no-sheet");
      const [sheetAction, setSheetAction] = useState("");
      const [sheetDebugMsg, setSheetDebugMsg] = useState("");

      useEffect(() => {
        fetch(`${SHEET_URL}?action=getConfig`)
          .then((r) => r.json())
          .then((j) => {
            if (j.departments?.length) setDepartments(j.departments);
            if (j.locations?.length) setLocations(j.locations);
          })
          .catch(() => {});
      }, []);

      const canAdvance = (() => {
        if (stepId === "plate") {
          return plateScanState === "done" || (plateScanState === "failed" && manualPlate.trim().length >= 4);
        }
        if (stepId === "unit") {
          return unitScanState === "done" || (unitScanState === "failed" && manualUnit.trim().length >= 3) || unitSkipped;
        }
        if (stepId === "vin") {
          return vinScanState === "done" || (vinScanState === "failed" && manualVin.replace(/[^A-HJ-NPR-Z0-9]/gi, "").length === 17);
        }
        if (stepId === "details") {
          return !!(submittedBy.trim() && department && location);
        }
        return false;
      })();

      const handlePlateCapture = async (data) => {
        setPlatePhoto(data);
        setPlateScanState("scanning");
        setDetectedPlate("");
        setManualPlate("");
        setPlateErrorMsg("");

        const r = await callAPI(data.file, "plate");

        if (r.found && r.plate) {
          setDetectedPlate(r.plate);
          setPlateScanState("done");
        } else {
          setPlateScanState("failed");
          setPlateErrorMsg(
            r.error || "No plate text found. Try a clearer photo or enter manually below."
          );
        }
      };

      const handleUnitCapture = async (data) => {
        setUnitPhoto(data);
        setUnitScanState("scanning");
        setDetectedUnit("");
        setManualUnit("");
        setUnitSkipped(false);
        setUnitErrorMsg("");

        const r = await callAPI(data.file, "unit");

        if (r.found && r.unit) {
          setDetectedUnit(r.unit);
          setUnitScanState("done");
        } else {
          setUnitScanState("failed");
          setUnitErrorMsg(
            r.error || "No unit number found. Try a clearer photo or enter manually below."
          );
        }
      };

      const handleVinCapture = async (data) => {
        setVinPhoto(data);
        setVinScanState("scanning");
        setDetectedVin("");
        setVehicleInfo(null);
        setManualVin("");
        setExistingRecord(null);
        setVinErrorMsg("");

        const r = await callAPI(data.file, "vin");

        if (!r.found || !r.vin) {
          setVinScanState("failed");
          setVinErrorMsg(
            r.error || "No VIN found. Try a clearer photo or enter the 17-character VIN manually."
          );
          return;
        }

        setDetectedVin(r.vin);
        setVinScanState("decoding");

        try {
          const info = await decodeVin(r.vin);
          setVehicleInfo(info);
          setVinScanState("done");

          const currentPlate = detectedPlate || manualPlate || "";

          fetch(`${SHEET_URL}?action=checkVehicle&vin=${encodeURIComponent(r.vin)}&plate=${encodeURIComponent(currentPlate)}`)
            .then((res) => res.json())
            .then((j) => {
              if (j.found) setExistingRecord(j);
            })
            .catch(() => {});
        } catch {
          setVinScanState("failed");
        }
      };

      const handleManualVin = async () => {
        const vin = manualVin.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, "");
        if (vin.length !== 17) return;

        setDetectedVin(vin);
        setVinScanState("decoding");
        setExistingRecord(null);

        try {
          const info = await decodeVin(vin);
          setVehicleInfo(info);
          setVinScanState("done");
        } catch {
          setVinScanState("failed");
        }
      };

      const sendToSheet = async (payload) => {
        const formBody = new URLSearchParams();
        formBody.set("payload", JSON.stringify(payload));

        const result = await fetchWithRetry(
          SHEET_URL,
          {
            method: "POST",
            body: formBody,
            redirect: "follow"
          },
          { retries: 3, baseDelay: 2000, timeout: 30000 }
        );

        return result;
      };

      const handleSubmit = async () => {
        setSubmitted(true);
        setSheetStatus("pending");
        setSheetDebugMsg("");
        setSheetAction("");

        const payload = {
          entryId: "FB-" + Date.now(),
          timestamp: new Date().toLocaleString(),
          vin: detectedVin || manualVin || "",
          licensePlate: detectedPlate || manualPlate || "",
          unitNumber: unitSkipped ? "N/A" : detectedUnit || manualUnit || "",
          unitSkipped,
          year: vehicleInfo?.year || "",
          make: vehicleInfo?.make || "",
          model: vehicleInfo?.model || "",
          trim: vehicleInfo?.trim || "",
          body: vehicleInfo?.body || "",
          engine: vehicleInfo?.engine || "",
          cylinders: vehicleInfo?.cylinders || "",
          drive: vehicleInfo?.drive || "",
          fuel: vehicleInfo?.fuel || "",
          submittedBy,
          department,
          location,
          assignedTo,
          notes,
          source: "FleetBuddy v5.0"
        };

        try {
          const result = await sendToSheet(payload);

          if (result.error) {
            setSheetStatus("error");
            setSheetDebugMsg(result.error);
          } else {
            setSheetStatus("synced");
            setSheetAction(existingRecord ? "UPDATED" : "NEW VEHICLE");
          }
        } catch (e) {
          console.error("FleetBuddy submit error:", e);
          setSheetStatus("error");
          setSheetDebugMsg("Could not reach Google Sheets. Check your connection and try again.");
        }
      };

      const reset = () => {
        setStep(0);
        setPlatePhoto(null);
        setPlateScanState("idle");
        setDetectedPlate("");
        setManualPlate("");
        setPlateErrorMsg("");
        setUnitPhoto(null);
        setUnitScanState("idle");
        setDetectedUnit("");
        setManualUnit("");
        setUnitSkipped(false);
        setUnitErrorMsg("");
        setVinPhoto(null);
        setVinScanState("idle");
        setDetectedVin("");
        setManualVin("");
        setVehicleInfo(null);
        setVinErrorMsg("");
        setSubmittedBy("");
        setDepartment("");
        setLocation("");
        setAssignedTo("");
        setNotes("");
        setExistingRecord(null);
        setSubmitted(false);
        setSheetStatus("no-sheet");
        setSheetAction("");
        setSheetDebugMsg("");
      };

      const plate = detectedPlate || manualPlate;
      const unit = unitSkipped ? "N/A" : detectedUnit || manualUnit;
      const vin = detectedVin || manualVin;

      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div
            style={{
              width: "100%",
              background: "rgba(7,9,13,0.95)",
              backdropFilter: "blur(20px)",
              borderBottom: "1px solid var(--border)",
              padding: "0 20px",
              position: "sticky",
              top: 0,
              zIndex: 100,
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between"
            }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "11px 0" }}>
              <div
                style={{
                  background: "rgba(0,212,255,0.08)",
                  border: "1px solid rgba(0,212,255,0.25)",
                  borderRadius: 4,
                  padding: "8px 11px",
                  fontSize: 20
                }}
              >
                🚗
              </div>

              <div>
                <div
                  style={{
                    fontFamily: "var(--display)",
                    fontSize: 28,
                    fontWeight: 800,
                    letterSpacing: "0.1em",
                    lineHeight: 1,
                    color: "var(--cyan)"
                  }}
                >
                  FleetBuddy
                </div>
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span
                style={{
                  width: 7,
                  height: 7,
                  borderRadius: "50%",
                  background: "var(--green)",
                  boxShadow: "0 0 8px var(--green)",
                  animation: "blink 2.5s ease-in-out infinite"
                }}
              />
              <span
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--muted)",
                  letterSpacing: "0.08em"
                }}
              >
                LIVE
              </span>
            </div>
          </div>

          <div style={{ width: "100%", maxWidth: 480, padding: "20px 16px 60px" }}>
            {submitted ? (
              <ConfirmationCard
                data={{
                  platePhoto,
                  unitPhoto,
                  vinPhoto,
                  plate,
                  unitNumber: unit,
                  vin,
                  vehicleInfo,
                  submittedBy,
                  department,
                  location,
                  assignedTo,
                  notes
                }}
                sheetStatus={sheetStatus}
                sheetAction={sheetAction}
                sheetDebugMsg={sheetDebugMsg}
                onReset={reset}
                onRetrySync={handleSubmit}
              />
            ) : (
              <>
                <div style={{ display: "flex", alignItems: "center", marginBottom: 24 }}>
                  {STEPS.map((s, i) => {
                    const done = i < step;
                    const cur = i === step;

                    return (
                      <React.Fragment key={s.id}>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                          <div
                            style={{
                              width: 38,
                              height: 38,
                              borderRadius: 3,
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                              fontFamily: "var(--mono)",
                              fontSize: done ? 16 : 11,
                              fontWeight: 700,
                              transition: "all 0.3s",
                              background: cur ? "var(--cyan)" : done ? "rgba(0,212,255,0.12)" : "var(--surface2)",
                              border: cur ? "none" : done ? "1px solid rgba(0,212,255,0.35)" : "1px solid var(--border)",
                              color: cur ? "#000" : done ? "var(--cyan)" : "var(--muted)",
                              boxShadow: cur ? "0 0 20px rgba(0,212,255,0.3)" : "none"
                            }}
                          >
                            {done ? "✓" : s.num}
                          </div>

                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 9,
                              letterSpacing: "0.07em",
                              textTransform: "uppercase",
                              whiteSpace: "nowrap",
                              color: cur ? "var(--cyan)" : done ? "rgba(0,212,255,0.45)" : "var(--muted)",
                              fontWeight: cur ? 600 : 400
                            }}
                          >
                            {s.short}
                          </div>
                        </div>

                        {i < STEPS.length - 1 && (
                          <div
                            style={{
                              flex: 1,
                              height: 1,
                              margin: "0 6px",
                              marginBottom: 20,
                              background: done ? "rgba(0,212,255,0.35)" : "var(--border)",
                              transition: "background 0.3s"
                            }}
                          />
                        )}
                      </React.Fragment>
                    );
                  })}
                </div>

                <BracketCard style={{ marginBottom: 14 }}>
                  <div
                    style={{
                      display: "flex",
                      alignItems: "baseline",
                      justifyContent: "space-between",
                      marginBottom: 18
                    }}
                  >
                    <div
                      style={{
                        fontFamily: "var(--display)",
                        fontSize: 30,
                        fontWeight: 800,
                        letterSpacing: "0.08em",
                        color: "var(--text)",
                        lineHeight: 1
                      }}
                    >
                      {STEPS[step]?.emoji} {STEPS[step]?.label.toUpperCase()}
                    </div>
                  </div>

                  {stepId === "plate" && (
                    <div className="animate-in">
                      <CameraCapture
                        label="License Plate"
                        hint="Fill the frame with the plate — every character must be legible"
                        onCapture={handlePlateCapture}
                        captured={platePhoto}
                        accentColor="var(--cyan)"
                      />

                      <ScanResult
                        state={plateScanState}
                        label="License Plate"
                        value={detectedPlate}
                        errorMsg={plateErrorMsg}
                      />

                      {plateScanState === "failed" && (
                        <div>
                          <ManualEntry
                            label="license plate"
                            value={manualPlate}
                            setValue={setManualPlate}
                            onSubmit={() => {
                              if (manualPlate.trim()) {
                                setDetectedPlate(manualPlate.trim());
                                setPlateScanState("done");
                              }
                            }}
                            btnLabel="CONFIRM PLATE →"
                            maxLen={10}
                            hint="Enter plate exactly as shown"
                          />
                        </div>
                      )}
                    </div>
                  )}

                  {stepId === "unit" && (
                    <div className="animate-in">
                      <CameraCapture
                        label="Unit Number"
                        hint="Get close to the unit number — number only in frame, no clutter"
                        onCapture={handleUnitCapture}
                        captured={unitPhoto}
                        accentColor="var(--amber)"
                      />

                      <ScanResult
                        state={unitScanState}
                        label="Unit Number"
                        value={detectedUnit}
                        errorMsg={unitErrorMsg}
                      />

                      {unitScanState === "failed" && !unitSkipped && (
                        <div className="animate-in">
                          <ManualEntry
                            label="unit number"
                            value={manualUnit}
                            setValue={setManualUnit}
                            onSubmit={() => {
                              if (manualUnit.trim()) {
                                setDetectedUnit(manualUnit.trim());
                                setUnitScanState("done");
                              }
                            }}
                            btnLabel="CONFIRM UNIT # →"
                            maxLen={6}
                            hint="4-digit number from the door or hood"
                          />

                          <button
                            onClick={() => setUnitSkipped(true)}
                            style={{
                              marginTop: 10,
                              width: "100%",
                              background: "transparent",
                              border: "1px solid var(--border2)",
                              borderRadius: 3,
                              padding: "11px",
                              color: "var(--muted)",
                              fontFamily: "var(--mono)",
                              fontSize: 10,
                              cursor: "pointer",
                              letterSpacing: "0.08em"
                            }}
                          >
                            NO UNIT # ON THIS VEHICLE — SKIP
                          </button>
                        </div>
                      )}

                      {unitSkipped && (
                        <div
                          className="animate-in"
                          style={{
                            marginTop: 12,
                            background: "rgba(74,97,128,0.1)",
                            border: "1px solid var(--border2)",
                            borderRadius: 4,
                            padding: "12px 14px",
                            display: "flex",
                            justifyContent: "space-between",
                            alignItems: "center"
                          }}
                        >
                          <span
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 10,
                              color: "var(--muted)",
                              letterSpacing: "0.08em"
                            }}
                          >
                            NO UNIT # — SKIPPED
                          </span>
                          <button
                            onClick={() => {
                              setUnitSkipped(false);
                              setUnitScanState("idle");
                              setUnitPhoto(null);
                            }}
                            style={{
                              background: "none",
                              border: "none",
                              color: "var(--cyan)",
                              fontFamily: "var(--mono)",
                              fontSize: 10,
                              cursor: "pointer",
                              textDecoration: "underline"
                            }}
                          >
                            undo
                          </button>
                        </div>
                      )}
                    </div>
                  )}

                  {stepId === "vin" && (
                    <div className="animate-in">
                      <CameraCapture
                        label="VIN"
                        hint="Get close — hold steady, good lighting, fill the frame with the sticker"
                        onCapture={handleVinCapture}
                        captured={vinPhoto}
                        accentColor="var(--green)"
                      />

                      <ScanResult
                        state={vinScanState}
                        label="VIN"
                        value={detectedVin}
                        isVin
                        errorMsg={vinErrorMsg}
                      />

                      {vinScanState === "done" && (
                        <VehicleCard info={vehicleInfo} vin={detectedVin} />
                      )}

                      {vinScanState === "failed" && (
                        <ManualEntry
                          label="VIN (17 characters)"
                          value={manualVin}
                          setValue={setManualVin}
                          onSubmit={handleManualVin}
                          btnLabel="DECODE VIN →"
                          maxLen={17}
                          hint="17 characters — from door jamb or dashboard"
                        />
                      )}
                    </div>
                  )}

                  {stepId === "details" && (
                    <div className="animate-in" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                        <DataTag label="Plate" value={plate} color="var(--cyan)" />
                        <DataTag label="Unit #" value={unit || "—"} color="var(--amber)" />
                        <DataTag
                          label="VIN"
                          value={vin?.length > 9 ? vin.slice(0, 9) + "…" : vin}
                          color="var(--green)"
                        />
                      </div>

                      {vehicleInfo && (
                        <div
                          style={{
                            background: "var(--surface2)",
                            border: "1px solid var(--border)",
                            borderRadius: 4,
                            padding: "12px 14px"
                          }}
                        >
                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 9,
                              color: "var(--muted)",
                              textTransform: "uppercase",
                              letterSpacing: "0.1em",
                              marginBottom: 6
                            }}
                          >
                            Decoded Vehicle
                          </div>
                          <div
                            style={{
                              fontFamily: "var(--display)",
                              fontSize: 20,
                              fontWeight: 700,
                              letterSpacing: "0.04em"
                            }}
                          >
                            {vehicleInfo.year} {vehicleInfo.make} {vehicleInfo.model}
                          </div>
                        </div>
                      )}

                      <div>
                        <label className="field-label">
                          Your Name <span style={{ color: "var(--red)" }}>*</span>
                        </label>
                        <input
                          value={submittedBy}
                          onChange={(e) => setSubmittedBy(e.target.value)}
                          placeholder="First and last name"
                          className={`field-input ${submittedBy ? "filled" : ""}`}
                        />
                      </div>

                      <div>
                        <label className="field-label">
                          Department <span style={{ color: "var(--red)" }}>*</span>
                        </label>
                        <select
                          value={department}
                          onChange={(e) => setDepartment(e.target.value)}
                          className={`field-input ${department ? "filled" : ""}`}
                          style={{ color: department ? "var(--text)" : "var(--muted)" }}
                        >
                          <option value="">Select department...</option>
                          {departments.map((d) => (
                            <option key={d} value={d}>
                              {d}
                            </option>
                          ))}
                        </select>

                        {department === "Dear Friends and Family" && (
                          <div
                            style={{
                              marginTop: 8,
                              background: "rgba(0,232,122,0.05)",
                              border: "1px solid rgba(0,232,122,0.2)",
                              borderRadius: 3,
                              padding: "8px 12px",
                              display: "flex",
                              gap: 8,
                              alignItems: "center"
                            }}
                          >
                            <span>💚</span>
                            <span
                              style={{
                                fontFamily: "var(--mono)",
                                fontSize: 10,
                                color: "var(--green)"
                              }}
                            >
                              PILOT MODE · Thanks for testing FleetBuddy!
                            </span>
                          </div>
                        )}
                      </div>

                      <div>
                        <label className="field-label">
                          Resource Center / Location <span style={{ color: "var(--red)" }}>*</span>
                        </label>
                        <select
                          value={location}
                          onChange={(e) => setLocation(e.target.value)}
                          className={`field-input ${location ? "filled" : ""}`}
                          style={{ color: location ? "var(--text)" : "var(--muted)" }}
                        >
                          <option value="">Select location...</option>
                          {locations.map((l) => (
                            <option key={l} value={l}>
                              {l}
                            </option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="field-label">
                          Assigned To <span style={{ color: "var(--muted)", fontWeight: 400 }}>(optional)</span>
                        </label>
                        <input
                          value={assignedTo}
                          onChange={(e) => setAssignedTo(e.target.value)}
                          placeholder="Driver or employee name"
                          className="field-input"
                        />
                      </div>

                      <div>
                        <label className="field-label">
                          Notes <span style={{ color: "var(--muted)", fontWeight: 400 }}>(optional)</span>
                        </label>
                        <textarea
                          value={notes}
                          onChange={(e) => setNotes(e.target.value)}
                          placeholder="Damage, odometer, special instructions..."
                          rows={3}
                          className="field-input"
                          style={{ resize: "none" }}
                        />
                      </div>

                      {existingRecord && (
                        <BracketCard accent="amber">
                          <div
                            style={{
                              fontFamily: "var(--display)",
                              fontSize: 15,
                              fontWeight: 700,
                              letterSpacing: "0.1em",
                              color: "var(--amber)",
                              marginBottom: 8
                            }}
                          >
                            ⚠ EXISTING RECORD FOUND
                          </div>
                          <div
                            style={{
                              fontFamily: "var(--body)",
                              fontSize: 15,
                              fontWeight: 600,
                              marginBottom: 4
                            }}
                          >
                            {[existingRecord.year, existingRecord.make, existingRecord.model].filter(Boolean).join(" ") || "Vehicle on file"}
                          </div>
                          {existingRecord.lastUpdated && (
                            <div
                              style={{
                                fontFamily: "var(--mono)",
                                fontSize: 10,
                                color: "var(--muted)"
                              }}
                            >
                              Last updated: {existingRecord.lastUpdated}
                              {existingRecord.submittedBy ? " · " + existingRecord.submittedBy : ""}
                            </div>
                          )}
                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 10,
                              color: "var(--amber)",
                              marginTop: 8
                            }}
                          >
                            → SUBMIT WILL UPDATE THIS RECORD
                          </div>
                        </BracketCard>
                      )}
                    </div>
                  )}
                </BracketCard>

                <div style={{ display: "flex", gap: 10 }}>
                  {step > 0 && (
                    <button
                      onClick={() => setStep((s) => s - 1)}
                      style={{
                        flex: 1,
                        background: "var(--surface)",
                        border: "1px solid var(--border2)",
                        color: "var(--muted)",
                        borderRadius: 3,
                        padding: "15px",
                        fontFamily: "var(--display)",
                        fontSize: 17,
                        fontWeight: 700,
                        letterSpacing: "0.1em",
                        cursor: "pointer"
                      }}
                    >
                      ← BACK
                    </button>
                  )}

                  <button
                    onClick={() => {
                      if (step < STEPS.length - 1) setStep((s) => s + 1);
                      else handleSubmit();
                    }}
                    disabled={!canAdvance}
                    style={{
                      flex: 2,
                      border: "none",
                      borderRadius: 3,
                      padding: "15px",
                      fontFamily: "var(--display)",
                      fontSize: 19,
                      fontWeight: 800,
                      letterSpacing: "0.15em",
                      transition: "all 0.2s",
                      cursor: canAdvance ? "pointer" : "not-allowed",
                      background: canAdvance ? "linear-gradient(90deg,#00d4ff,#0099cc)" : "var(--surface2)",
                      color: canAdvance ? "#000" : "var(--muted)",
                      boxShadow: canAdvance ? "0 4px 24px rgba(0,212,255,0.25)" : "none"
                    }}
                  >
                    {step < STEPS.length - 1 ? "NEXT →" : existingRecord ? "UPDATE VEHICLE ✓" : "SUBMIT VEHICLE ✓"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
